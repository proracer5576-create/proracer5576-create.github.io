      color: var(--text);

      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 60px;
      padding: 0 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo svg { height: 32px; width: 32px; }

    .nav-wordmark {
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2.2rem;
      align-items: center;
      height: 100%;
    }

    nav ul > li {
      height: 100%;
      display: flex;
      align-items: center;
    }

    nav ul > li > a {
      color: var(--text-sub);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      height: 100%;
      display: flex;
      align-items: center;
      position: relative;
      transition: color 0.2s;
    }

    nav ul > li > a::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--green);
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    nav ul > li > a:hover { color: var(--green); }
    nav ul > li > a:hover::after { transform: scaleX(1); }
    nav ul > li > a.nav-active { color: var(--green); }
    nav ul > li > a.nav-active::after { transform: scaleX(1); }

    /* Dropdown */
    .nav-dropdown {
      position: relative;
    }

    .nav-dropdown > a .arrow {
      display: inline-block;
      width: 4px; height: 4px;
      border-right: 1.2px solid var(--text-sub);
      border-bottom: 1.2px solid var(--text-sub);
      transform: rotate(45deg);
      margin-left: 0.35rem;
      margin-top: -2px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .nav-dropdown:hover > a .arrow {
      border-color: var(--green);
      transform: rotate(-135deg);
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--white);
      border: 1px solid var(--border);
      border-top: 2px solid var(--green);
      border-radius: 0 0 8px 8px;
      padding: 0.5rem 0;
      min-width: 180px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .nav-dropdown:hover .dropdown-menu {
      opacity: 1;
      visibility: visible;
    }

    .dropdown-menu a {
      display: block;
      padding: 0.6rem 1.2rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-sub);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
      height: auto;
      position: static;
    }

    .dropdown-menu a::after { display: none !important; }

    .dropdown-menu a:hover {
      color: var(--green);
      background: var(--bg);
    }

    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* ?? HERO ?? */
    .hero {

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 8rem 2rem 6rem;

    .hero-logo {
      margin-bottom: 2.5rem;

    .hero-line {
      width: 40px;
      height: 2px;
      background: var(--green);
      margin: 1.5rem auto;
      animation: fadeUp 0.6s ease-out 0.16s both;

    .hero-tagline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 400;
      color: var(--text);
      animation: fadeUp 0.6s ease-out 0.24s both;

    .hero-desc {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text-sub);
      margin-top: 0.8rem;
      max-width: 360px;
      line-height: 1.8;
      animation: fadeUp 0.6s ease-out 0.32s both;
    }

    .hero-pills {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2.5rem;
      animation: fadeUp 0.6s ease-out 0.4s both;
    }

    .pill {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 0.4rem 0.9rem;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-sub);
      letter-spacing: 0.04em;
      transition: border-color 0.2s, color 0.2s;
    }

    .pill:hover { border-color: var(--green); color: var(--green); }

    .hero-cta {
      margin-top: 2.5rem;
      animation: fadeUp 0.6s ease-out 0.48s both;
    }

    .btn {
      font-family: 'Sora', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      letter-spacing: 0.06em;
      display: inline-block;

    .btn--green {

    .btn--green:hover {

    .btn--outline {

    .btn--outline:hover {

      color: var(--white);

    @keyframes fadeUp {

    .trending-item:hover { padding-left: 1rem; }

    .archive-item:hover { padding-left: 1rem; }

    .link-card:hover { background: var(--bg); }
    .link-card:hover::after { opacity: 1; }

    .link-emoji { font-size: 1.4rem; }
    .link-name { font-weight: 600; font-size: 0.82rem; }
    .link-handle { font-size: 0.68rem; color: var(--text-light); font-weight: 300; }

    /* ?? CTA ?? */

    .cta-line {

    .cta-section h2 {

      margin-bottom: 0.6rem;

    .cta-section p {
      color: var(--text-sub);

      font-size: 0.88rem;
      margin-bottom: 2rem;

    /* ?? FOOTER ?? */

    footer .brand { color: var(--green); font-weight: 600; }

    /* ?? ANIMATIONS ?? */
    .reveal {
      opacity: 0;
      transform: translateY(16px);

    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ?? RESPONSIVE ?? */
    @media (max-width: 768px) {
      nav { padding: 0 1.5rem; }
      nav ul { display: none; }

      nav ul.open .dropdown-menu {

        opacity: 1;

        border: none;

        border-left: 2px solid var(--green);
        border-radius: 0;
        padding: 0.3rem 0 0.3rem 0.8rem;
        margin-top: 0.3rem;
        min-width: auto;
      }

      .container { padding: 0 1.5rem; }
      .menu-grid { grid-template-columns: 1fr; }
      .links-grid { grid-template-columns: repeat(2, 1fr); }

      .project-card { grid-template-columns: 1fr auto; }
      .project-card::before, .trending-item::before, .archive-item::before {
        left: -1.5rem;
      }

      .trending-item { grid-template-columns: 24px 1fr auto; gap: 0.8rem; }

      .archive-item { grid-template-columns: 1fr; gap: 0.2rem; }
      .archive-date { order: 1; }
      .archive-title { order: 0; }
      .archive-tag { justify-self: start; order: 2; }

      .hero-logo svg { width: 64px; height: 64px; }
    }

    @media (max-width: 480px) {
      .links-grid { grid-template-columns: 1fr 1fr; }
      .trending-item { grid-template-columns: 1fr auto; }
      .trending-num { display: none; }
    }
  </style>
</head>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 50);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  const sectionIds = ['menu','projects','trending','archive','links'];
  const navLinks = document.querySelectorAll('nav ul > li > a');

  window.addEventListener('scroll', () => {
    let current = '';
    sectionIds.forEach(id => {
      const el = document.getElementById(id);
      if (el && scrollY >= el.offsetTop - 120) current = id;
    });
    navLinks.forEach(a => {
      const isActive = a.getAttribute('href') === '#' + current;
      if (isActive) {
        a.style.color = 'var(--green)';
        a.classList.add('nav-active');
      } else {
        a.style.color = '';
        a.classList.remove('nav-active');
      }
    });
  });
</script>
